# MeshRadio configuration — copy to meshradio.toml (dev) or
# /etc/meshradio/config.toml (appliance). Every key is optional;
# defaults live in meshradio/config.py.

hardware_profile = "dev"        # dev | pi4 | lite
data_dir = "./data"             # SQLite archive + audio cache ("/var/lib/meshradio" on the appliance)

[mesh]
enabled = false                 # true on the full kit (pi4)
serial_port = ""                # empty = autodetect /dev/ttyUSB*
channel = "#music"
channel_key = ""                # MeshCore channel key

[corescope]
enabled = true
base_url = "https://scope.digitaino.com"   # Austin CoreScope instance
channel = "#music"
poll_interval_s = 180

[letsmesh]
# Backup channel feed: the LetsMesh MeshCore analyzer, same CoreScope-style
# API. Fills the archive when the Austin CoreScope instance is down; messages
# both feeds see dedupe against each other, so it's a no-op when CoreScope is
# healthy. Set enabled = false to turn the backup off.
enabled = true
base_url = "https://analyzer.letsmesh.net"
channel = "#music"
poll_interval_s = 180

[player]
backend = "auto"                # auto | mpv | web | embed | null — auto picks mpv on pi4/lite,
                                # web (browser is the speaker) everywhere else. embed streams
                                # via the YouTube IFrame player (public-hosting mode, no downloads)
live_autoplay = true            # auto-play new arrivals when idle in Live mode
quiet_hours = ""                # e.g. "22:00-08:00" to suppress autoplay overnight
timezone = "America/Chicago"    # channel-local day boundary for themes
volume = 70
radio_batch = 10                # tracks pulled per YouTube Mix fetch in radio mode

[cache]
max_bytes = 8589934592          # 8 GB LRU cap
ytdlp_bin = "yt-dlp"
audio_format = "opus"
max_retries = 3
retry_backoff_s = 30
ffmpeg_location = ""            # set if ffmpeg isn't on PATH (passed to yt-dlp)
ytdlp_extra_args = []           # e.g. ["--js-runtimes", "deno:/path/to/deno"] if deno isn't on PATH

[web]
host = "0.0.0.0"
port = 8080
ingest_token = ""               # non-empty enables POST /api/ingest (relay receiver);
                                # on hosts prefer the MESHRADIO_INGEST_TOKEN env var

[relay]
# Mirror this node's channel history to a hosted instance that can't poll
# CoreScope itself (Cloudflare challenges datacenter IPs). Runs only when
# both keys are set.
push_url = ""                   # e.g. "https://meshradio.example.org"
token = ""                      # must match the receiver's ingest token
interval_s = 120

[backup]
# Rotating snapshots of the archive DB — a rollback point for a bad migration
# or corruption. A snapshot is taken before migrations on each boot and then
# every interval_s; the newest `keep` are retained. For whole-disk loss, pair
# this with host-level disk snapshots or point `dir` at separate storage.
enabled = true
interval_s = 21600              # 6h between periodic snapshots
keep = 8                        # snapshots to retain (older pruned)
dir = ""                        # snapshot dir; empty = <data_dir>/backups
