<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MeshRadio</title>
  <link rel="stylesheet" href="/static/style.css?v={{ asset_v }}">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header>
    <h1><a href="/">📻 MeshRadio</a></h1>
    <nav>
      <a href="/">Now Playing</a>
      <a href="/archive">Archive</a>
    </nav>
  </header>
  <!-- Embed mode: the speaker tab streams from YouTube in this window. It
       lives outside the htmx-swapped containers so state pushes don't
       destroy the iframe mid-song. -->
  <section id="yt-window" hidden>
    <div id="yt-player"></div>
  </section>
  <main>
    {% block content %}{% endblock %}
  </main>
  <button id="audio-ctl" hidden></button>
  {% if embed_mode %}
  <!-- Public host only: the button script self-inserts here. Kept outside
       <main> so htmx partial swaps never destroy it. -->
  <footer id="site-footer">
    <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="meshradio" data-color="#FFDD00" data-emoji="☕"  data-font="Arial" data-text="Buy me a coffee" data-outline-color="#000000" data-font-color="#000000" data-coffee-color="#ffffff" ></script>
  </footer>
  {% endif %}
  <!-- Classic scripts sharing top-level bindings; order matters (see radio.js).
       No build chain, ever (architecture §9). -->
  <script src="/static/js/radio.js?v={{ asset_v }}"></script>
  <script src="/static/js/embed.js?v={{ asset_v }}"></script>
  <script src="/static/js/eq.js?v={{ asset_v }}"></script>
  <script src="/static/js/playbar.js?v={{ asset_v }}"></script>
</body>
</html>
