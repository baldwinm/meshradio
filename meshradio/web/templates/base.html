<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MeshRadio</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header>
    <h1><a href="/">📻 MeshRadio</a></h1>
    <nav>
      <a href="/">Now Playing</a>
      <a href="/archive">Archive</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <button id="audio-ctl" hidden></button>
  <script>
    // Web playback: exactly ONE connected page is the "speaker" (the server
    // elects the newest connection; the button below claims the role). The
    // speaker's <audio> element streams the cached file; on 'ended' it tells
    // the server to advance, guarded server-side by track id so duplicate
    // signals can't double-skip.
    const audio = new Audio();
    const audioCtl = document.getElementById("audio-ctl");
    let currentTrackId = null;
    let socket = null;

    audioCtl.addEventListener("click", () => {
      if (audioCtl.dataset.action === "claim" && socket) {
        socket.send("claim");           // server re-elects and pushes new state
      } else {
        audio.play().catch(() => {});   // autoplay was blocked; this click unblocks
      }
      audioCtl.hidden = true;
    });

    function showCtl(action, label) {
      audioCtl.dataset.action = action;
      audioCtl.textContent = label;
      audioCtl.hidden = false;
    }

    function applyState(s) {
      if (!s.web_audio) return;
      if (!s.speaker) {
        currentTrackId = null;
        audio.pause();
        audio.removeAttribute("src");
        if (s.status === "playing") showCtl("claim", "🔊 Play audio in this tab");
        else audioCtl.hidden = true;
        return;
      }
      audio.volume = s.volume / 100;
      if (s.status === "playing" && s.current) {
        if (currentTrackId !== s.current.id) {
          currentTrackId = s.current.id;
          audio.src = "/audio/" + s.current.id;
          audio.onended = () => fetch("/api/ended/" + currentTrackId, { method: "POST" });
        } else if (audio.readyState > 0 && Math.abs(audio.currentTime - s.position) > 3) {
          audio.currentTime = s.position;  // a remote tab scrubbed; follow it
        }
        // Browsers block autoplay before the first user gesture; offer a button.
        audio.play().then(() => { audioCtl.hidden = true; })
                    .catch(() => { showCtl("enable", "🔊 Click to enable audio"); });
      } else if (s.status === "paused") {
        audio.pause();
      } else {
        currentTrackId = null;
        audio.pause();
        audio.removeAttribute("src");
        audioCtl.hidden = true;
      }
    }

    // Play bar. The speaker tab reads its own <audio> element (exact);
    // remote tabs extrapolate from the last server state + wall clock.
    // The htmx swap replaces the bar's DOM on every state event, so the
    // ticker re-queries elements each time and handlers live inline.
    let lastPos = { value: 0, at: Date.now(), playing: false, duration: 0 };

    function trackPos(s) {
      lastPos = {
        value: s.position || 0,
        at: Date.now(),
        playing: s.status === "playing",
        duration: (s.current && s.current.duration) || 0,
      };
    }

    function fmtTime(s) {
      s = Math.max(0, Math.round(s));
      const m = Math.floor(s / 60) % 60, h = Math.floor(s / 3600), sec = String(s % 60).padStart(2, "0");
      return h ? h + ":" + String(m).padStart(2, "0") + ":" + sec : m + ":" + sec;
    }

    function paintBar(scrub, pos, dur) {
      const elapsed = document.getElementById("pb-elapsed");
      const remaining = document.getElementById("pb-remaining");
      if (elapsed) elapsed.textContent = fmtTime(pos);
      if (remaining) remaining.textContent = dur ? "-" + fmtTime(dur - pos) : "";
    }

    setInterval(() => {
      const scrub = document.getElementById("pb-scrub");
      if (!scrub || scrub.dataset.seeking) return;
      let pos, dur;
      if (currentTrackId !== null && audio.src) {          // this tab is the speaker
        pos = audio.currentTime;
        dur = audio.duration || lastPos.duration;
      } else {
        pos = lastPos.value + (lastPos.playing ? (Date.now() - lastPos.at) / 1000 : 0);
        dur = lastPos.duration;
      }
      if (dur) pos = Math.min(pos, dur);
      if (dur && +scrub.max !== Math.round(dur)) scrub.max = Math.round(dur);
      scrub.value = Math.round(pos);
      paintBar(scrub, pos, dur);
    }, 500);

    function scrubPreview(el) {                            // dragging: preview only
      el.dataset.seeking = "1";
      paintBar(el, +el.value, +el.max);
    }

    function scrubCommit(el) {                             // released: actually seek
      delete el.dataset.seeking;
      const pos = +el.value;
      if (currentTrackId !== null && audio.src) audio.currentTime = pos;
      fetch("/api/seek/" + pos, { method: "POST" });       // keep server clock + remotes in sync
    }

    // Live state: drive the audio element and nudge htmx containers to re-fetch.
    (function connect() {
      const ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");
      socket = ws;
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.topic === "player.state") { trackPos(msg.data); applyState(msg.data); }
        document.body.dispatchEvent(new Event("meshradio:state"));
      };
      ws.onclose = () => { socket = null; setTimeout(connect, 3000); };
    })();
  </script>
</body>
</html>
