<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MeshRadio</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header>
    <h1><a href="/">📻 MeshRadio</a></h1>
    <nav>
      <a href="/">Now Playing</a>
      <a href="/archive">Archive</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <button id="audio-ctl" hidden></button>
  <script>
    // Web playback: exactly ONE connected page is the "speaker" (the server
    // elects the newest connection; the button below claims the role). The
    // speaker's <audio> element streams the cached file; on 'ended' it tells
    // the server to advance, guarded server-side by track id so duplicate
    // signals can't double-skip.
    const audio = new Audio();
    const audioCtl = document.getElementById("audio-ctl");
    let currentTrackId = null;
    let socket = null;

    audioCtl.addEventListener("click", () => {
      if (audioCtl.dataset.action === "claim" && socket) {
        socket.send("claim");           // server re-elects and pushes new state
      } else {
        audio.play().catch(() => {});   // autoplay was blocked; this click unblocks
        if (audioCtx) audioCtx.resume().catch(() => {});
      }
      audioCtl.hidden = true;
    });

    // -- EQ + visualizer (Web Audio; lives in the speaker tab, which IS the
    // sound card in web-playback mode). Once the <audio> element is wired
    // into the graph its output only reaches the speakers through it, so the
    // graph is built lazily on first playback and resumed on user gesture.
    const EQ_FREQS = [60, 170, 310, 600, 1000, 3000, 6000, 12000, 14000, 16000];
    let audioCtx = null, analyser = null, preampNode = null;
    const eqFilters = [];
    let eq = { on: true, preamp: 0, bands: EQ_FREQS.map(() => 0) };
    try { eq = Object.assign(eq, JSON.parse(localStorage.getItem("meshradio-eq") || "{}")); } catch (e) {}

    function dbGain(db) { return Math.pow(10, db / 20); }

    function ensureGraph() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      let node = audioCtx.createMediaElementSource(audio);
      preampNode = audioCtx.createGain();
      node.connect(preampNode);
      node = preampNode;
      EQ_FREQS.forEach((freq, i) => {
        const f = audioCtx.createBiquadFilter();
        f.type = i === 0 ? "lowshelf" : i === EQ_FREQS.length - 1 ? "highshelf" : "peaking";
        f.frequency.value = freq;
        if (f.type === "peaking") f.Q.value = 1.1;
        node.connect(f);
        node = f;
        eqFilters.push(f);
      });
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.72;
      node.connect(analyser);
      analyser.connect(audioCtx.destination);
      applyEq();
    }

    function activateGraph() {
      ensureGraph();
      if (audioCtx.state !== "running") {
        audioCtx.resume().catch(() => {});
        // If the browser refuses without a gesture the audio is silent, so
        // surface the existing unblock button; its click resumes the context.
        setTimeout(() => {
          if (audioCtx.state !== "running") showCtl("enable", "🔊 Click to enable audio");
        }, 300);
      }
    }

    function applyEq() {
      const btn = document.getElementById("eq-on");
      if (btn) btn.classList.toggle("active", eq.on);
      if (!audioCtx) return;
      preampNode.gain.value = eq.on ? dbGain(eq.preamp) : 1;
      eqFilters.forEach((f, i) => { f.gain.value = eq.on ? (eq.bands[i] || 0) : 0; });
    }

    function saveEq() { localStorage.setItem("meshradio-eq", JSON.stringify(eq)); applyEq(); }
    function eqBand(i, v) { eq.bands[i] = +v; saveEq(); }
    function eqPreamp(v) { eq.preamp = +v; saveEq(); }
    function eqToggle() { eq.on = !eq.on; saveEq(); }
    function eqReset() { eq.preamp = 0; eq.bands = EQ_FREQS.map(() => 0); saveEq(); syncEqSliders(); }

    function syncEqSliders() {
      const pre = document.getElementById("eq-preamp");
      if (pre) pre.value = eq.preamp;
      document.querySelectorAll(".band-input").forEach((el, i) => { el.value = eq.bands[i] || 0; });
      applyEq();
    }

    document.addEventListener("DOMContentLoaded", () => {
      syncEqSliders();
      const win = document.getElementById("eq-window");
      if (win) {
        win.open = localStorage.getItem("meshradio-eq-open") === "1";
        win.addEventListener("toggle", () =>
          localStorage.setItem("meshradio-eq-open", win.open ? "1" : "0"));
      }
    });

    // Spectrum analyzer: 19 log-spaced bars with slowly falling peak caps,
    // drawn from real FFT data when this tab is playing, flat otherwise.
    // htmx replaces the canvas on every state push, so look it up per frame.
    const VIS_BARS = 19;
    const visLevels = new Array(VIS_BARS).fill(0);
    const visPeaks = new Array(VIS_BARS).fill(0);
    let visData = null;

    (function drawVis() {
      requestAnimationFrame(drawVis);
      const c = document.getElementById("vis-canvas");
      if (!c) return;
      const g = c.getContext("2d");
      const W = c.width, H = c.height;
      g.fillStyle = "#000";
      g.fillRect(0, 0, W, H);
      const live = analyser && audio.src && !audio.paused;
      if (live) {
        if (!visData || visData.length !== analyser.frequencyBinCount)
          visData = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(visData);
      }
      const grad = g.createLinearGradient(0, H, 0, 0);
      grad.addColorStop(0, "#00e800");
      grad.addColorStop(0.6, "#ffe000");
      grad.addColorStop(1, "#ff4030");
      const bw = W / VIS_BARS;
      for (let i = 0; i < VIS_BARS; i++) {
        let level = 0;
        if (live) {
          // log-spaced bin ranges so the bass doesn't hog every bar
          const lo = Math.floor(Math.pow(visData.length, i / VIS_BARS));
          const hi = Math.max(lo + 1, Math.floor(Math.pow(visData.length, (i + 1) / VIS_BARS)));
          let sum = 0;
          for (let j = lo; j < hi; j++) sum += visData[j];
          level = sum / (hi - lo) / 255;
        }
        visLevels[i] = Math.max(level, visLevels[i] - 0.07);        // smooth fall
        visPeaks[i] = Math.max(visLevels[i], visPeaks[i] - 0.008);  // caps fall slower
        const h = Math.round(visLevels[i] * (H - 2));
        if (h > 0) {
          g.fillStyle = grad;
          g.fillRect(i * bw + 1, H - h, bw - 2, h);
        }
        const ph = Math.round(visPeaks[i] * (H - 2));
        if (ph > 1) {
          g.fillStyle = "#b0e8c0";
          g.fillRect(i * bw + 1, H - ph - 1, bw - 2, 1);
        }
      }
      // dark scanlines for the segmented Winamp look
      g.fillStyle = "rgba(0,0,0,0.45)";
      for (let y = H - 3; y > 0; y -= 3) g.fillRect(0, y, W, 1);
    })();

    function showCtl(action, label) {
      audioCtl.dataset.action = action;
      audioCtl.textContent = label;
      audioCtl.hidden = false;
    }

    function applyState(s) {
      if (!s.web_audio) return;
      if (!s.speaker) {
        currentTrackId = null;
        audio.pause();
        audio.removeAttribute("src");
        if (s.status === "playing") showCtl("claim", "🔊 Play audio in this tab");
        else audioCtl.hidden = true;
        return;
      }
      audio.volume = s.volume / 100;
      if (s.status === "playing" && s.current) {
        if (currentTrackId !== s.current.id) {
          currentTrackId = s.current.id;
          audio.src = "/audio/" + s.current.id;
          audio.onended = () => fetch("/api/ended/" + currentTrackId, { method: "POST" });
        } else if (audio.readyState > 0 && Math.abs(audio.currentTime - s.position) > 3) {
          audio.currentTime = s.position;  // a remote tab scrubbed; follow it
        }
        // Browsers block autoplay before the first user gesture; offer a button.
        audio.play().then(() => { audioCtl.hidden = true; activateGraph(); })
                    .catch(() => { showCtl("enable", "🔊 Click to enable audio"); });
      } else if (s.status === "paused") {
        audio.pause();
      } else {
        currentTrackId = null;
        audio.pause();
        audio.removeAttribute("src");
        audioCtl.hidden = true;
      }
    }

    // Play bar. The speaker tab reads its own <audio> element (exact);
    // remote tabs extrapolate from the last server state + wall clock.
    // The htmx swap replaces the bar's DOM on every state event, so the
    // ticker re-queries elements each time and handlers live inline.
    let lastPos = { value: 0, at: Date.now(), playing: false, duration: 0 };

    function trackPos(s) {
      lastPos = {
        value: s.position || 0,
        at: Date.now(),
        playing: s.status === "playing",
        duration: (s.current && s.current.duration) || 0,
      };
    }

    function fmtTime(s) {
      s = Math.max(0, Math.round(s));
      const m = Math.floor(s / 60) % 60, h = Math.floor(s / 3600), sec = String(s % 60).padStart(2, "0");
      return h ? h + ":" + String(m).padStart(2, "0") + ":" + sec : m + ":" + sec;
    }

    function paintBar(scrub, pos, dur) {
      const elapsed = document.getElementById("pb-elapsed");
      const remaining = document.getElementById("pb-remaining");
      if (elapsed) elapsed.textContent = fmtTime(pos);
      if (remaining) remaining.textContent = dur ? "-" + fmtTime(dur - pos) : "";
    }

    setInterval(() => {
      const scrub = document.getElementById("pb-scrub");
      if (!scrub || scrub.dataset.seeking) return;
      let pos, dur;
      if (currentTrackId !== null && audio.src) {          // this tab is the speaker
        pos = audio.currentTime;
        dur = audio.duration || lastPos.duration;
      } else {
        pos = lastPos.value + (lastPos.playing ? (Date.now() - lastPos.at) / 1000 : 0);
        dur = lastPos.duration;
      }
      if (dur) pos = Math.min(pos, dur);
      if (dur && +scrub.max !== Math.round(dur)) scrub.max = Math.round(dur);
      scrub.value = Math.round(pos);
      paintBar(scrub, pos, dur);
    }, 500);

    function scrubPreview(el) {                            // dragging: preview only
      el.dataset.seeking = "1";
      paintBar(el, +el.value, +el.max);
    }

    function scrubCommit(el) {                             // released: actually seek
      delete el.dataset.seeking;
      const pos = +el.value;
      if (currentTrackId !== null && audio.src) audio.currentTime = pos;
      fetch("/api/seek/" + pos, { method: "POST" });       // keep server clock + remotes in sync
    }

    // Live state: drive the audio element and nudge htmx containers to re-fetch.
    (function connect() {
      const ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");
      socket = ws;
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.topic === "player.state") { trackPos(msg.data); applyState(msg.data); }
        document.body.dispatchEvent(new Event("meshradio:state"));
      };
      ws.onclose = () => { socket = null; setTimeout(connect, 3000); };
    })();
  </script>
</body>
</html>
