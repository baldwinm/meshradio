# Render blueprint: deploys meshradio in embed mode (no audio downloads;
# each visitor's browser streams from YouTube via the IFrame player).
# The archive DB lives on a persistent disk (below) so history survives
# deploys, restarts, and idle spin-downs — it no longer depends on the Pi
# relay re-pushing (or CoreScope re-ingesting) after a wipe. Render only
# allows persistent disks on paid instances, hence the Starter plan.
services:
  - type: web
    name: meshradio
    runtime: python
    plan: starter
    buildCommand: pip install .
    startCommand: meshradio --config meshradio.render.toml --port $PORT
    # Deploy only after GitHub Actions is green; restart if /healthz stops
    # answering (dashboard equivalents: Settings -> Build & Deploy).
    autoDeployTrigger: checksPass
    healthCheckPath: /healthz
    # Persists ./data (meshradio.db lives here; data_dir in
    # meshradio.render.toml resolves to /opt/render/project/src/data). Small:
    # embed mode stores only metadata rows, never downloaded audio.
    disk:
      name: meshradio-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Shared secret for POST /api/ingest (the Pi relay pushes channel
      # history here). Copy the generated value into the Pi's [relay] token.
      - key: MESHRADIO_INGEST_TOKEN
        generateValue: true
